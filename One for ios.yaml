# =================================================
# 1. 核心环境：Tun 模式 (SideStore 救命必须项)
# =================================================
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  loopback-address:
    - 10.7.0.1

# =================================================
# 2. 资源配置 (双订阅)
# =================================================
proxy-providers:
  # [主力] 樱桃网络
  Cherry-Main:
    type: http
    url: "YOUR_MAIN_SUBSCRIPTION_URL_HERE"
    interval: 3600
    path: ./proxies/cherry.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

  # [备用] Kitty 免费池
  Kitty-Expansion:
    type: http
    url: "YOUR_BASE_SUBSCRIPTION_URL_HERE"
    interval: 3600
    path: ./proxies/kitty.yaml
    filter: "(?i)(港|HK|Hong|台|TW|Tai|美|US|States|America|韩|Korea)"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

# =================================================
# 3. 策略组 (逻辑引擎)
# =================================================
proxy-groups:
  # --- 总控 ---
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "⚡ 优质自动"
      - "🐱 廉价自动"
      - "DIRECT"
    use:
      - Cherry-Main
      - Kitty-Expansion

  # --- 自动引擎 ---
  - name: "⚡ 优质自动"
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    use:
      - Cherry-Main

  - name: "🐱 廉价自动"
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    use:
      - Kitty-Expansion

  # --- 地区自动 ---
  - name: "🇺🇸 US 自动"
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    use:
      - Cherry-Main
    filter: "(?i)(美国|美國|US|States|America)"

  - name: "🇸🇬 SG 自动"
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    use:
      - Cherry-Main
    filter: "(?i)(新加坡|獅城|Singapore|SG)"

  - name: "🇯🇵 JP 自动"
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    use:
      - Cherry-Main
    filter: "(?i)(日本|JP|Japan)"

  - name: "🇰🇷 KR 自动"
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    use:
      - Cherry-Main
    filter: "(?i)(韩国|韓|Korea|KR|Seoul)"

  # --- 功能分流 ---
  - name: "🤖 AI 专线"
    type: select
    proxies:
      - "🇺🇸 US 自动"
      - "🇸🇬 SG 自动"
      - "🇯🇵 JP 自动"
      - "🇰🇷 KR 自动"
      - "🚀 节点选择"

  - name: "💬 GPT 专线"
    type: select
    proxies:
      - "🇺🇸 US 自动"
      - "🇸🇬 SG 自动"
      - "🇯🇵 JP 自动"
      - "🇰🇷 KR 自动"
      - "🚀 节点选择"

  - name: "🎮 游戏商店"
    type: select
    proxies:
      - "🐱 廉价自动"
      - "⚡ 优质自动"
      - "🚀 节点选择"
      - "DIRECT"

  - name: "⬇️ GitHub"
    type: select
    proxies:
      - "🐱 廉价自动"
      - "⚡ 优质自动"
      - "🚀 节点选择"
      - "DIRECT"
    use:
      - Kitty-Expansion

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "🐱 廉价自动"
      - "🚀 节点选择"
      - "⚡ 优质自动"
      - "DIRECT"

  - name: "🇨🇳 国内连接"
    type: select
    proxies:
      - "DIRECT"
      - "🚀 节点选择"

